name: packages/web

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

env:
  NODE_VERSION: 22.x

jobs:
  build:
    name: Build Test (packages/web-qwik)
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: 22.x

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Run Build Test
        run: pnpm run build
        working-directory: packages/web-qwik

  eslint:
    name: Lint (packages/web-qwik) - ESLint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install
        working-directory: packages/web-qwik

      - name: Run ESLint
        run: pnpm run lint
        working-directory: packages/web-qwik

  stylelint:
    name: Lint (packages/web-qwik) - Stylelint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install
        working-directory: packages/web-qwik

      - name: Run Stylelint
        run: pnpm run stylelint
        working-directory: packages/web-qwik
